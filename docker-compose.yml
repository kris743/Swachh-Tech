version: '3.9'

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: swachh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swachh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swachh_pass}
      POSTGRES_DB: ${POSTGRES_DB:-swachh_tech_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swachh_user} -d ${POSTGRES_DB:-swachh_tech_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swachh-network

  # ---- Redis Cache ----
  redis:
    image: redis:7-alpine
    container_name: swachh-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - swachh-network

  # ---- NestJS Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swachh-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-swachh_user}:${POSTGRES_PASSWORD:-swachh_pass}@postgres:5432/${POSTGRES_DB:-swachh_tech_db}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production_32chars}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_prod}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      AI_SERVICE_URL: http://ai-service:8000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swachh-network

  # ---- Next.js Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swachh-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: http://localhost:4000
      NEXT_PUBLIC_AI_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - swachh-network

  # ---- FastAPI AI Service ----
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: swachh-ai
    restart: unless-stopped
    environment:
      AI_PORT: 8000
      AI_DATABASE_URL: postgresql://${POSTGRES_USER:-swachh_user}:${POSTGRES_PASSWORD:-swachh_pass}@postgres:5432/${POSTGRES_DB:-swachh_tech_db}
      AI_REDIS_URL: redis://redis:6379/1
      AI_MODEL_PATH: /app/models
      AI_LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swachh-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  swachh-network:
    driver: bridge
